<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Text To Speech Converter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:600px;
    background:#1e1e1e;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(255,255,255,0.1);
}

h1{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:150px;
    resize:none;
    border:none;
    outline:none;
    padding:15px;
    border-radius:10px;
    font-size:16px;
}

.controls{
    margin-top:15px;
}

label{
    color:white;
    display:block;
    margin-top:10px;
}

select,input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:8px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
}

.speak{
    background:#28a745;
    color:white;
}

.pause{
    background:#ffc107;
}

.resume{
    background:#17a2b8;
    color:white;
}

.stop{
    background:#dc3545;
    color:white;
}
</style>
</head>

<body>

<div class="container">
    <h1>Text To Speech Converter</h1>

    <textarea id="text"
    placeholder="Enter your text here..."></textarea>

    <div class="controls">

        <label>Select Voice</label>
        <select id="voices"></select>

        <label>Speech Rate</label>
        <input type="range" id="rate"
               min="0.5" max="2" step="0.1" value="1">

        <label>Pitch</label>
        <input type="range" id="pitch"
               min="0" max="2" step="0.1" value="1">

    </div>



    <div class="buttons">
        <button onclick="downloadMP3()">Download MP3</button>
        <button class="speak" onclick="speakText()">Speak</button>
        <button class="pause" onclick="pauseSpeech()">Pause</button>
        <button class="resume" onclick="resumeSpeech()">Resume</button>
        <button class="stop" onclick="stopSpeech()">Stop</button>
    </div>

</div>

<script>

const voiceSelect = document.getElementById("voices");
let voices = [];

function loadVoices() {

    voices = speechSynthesis.getVoices();

    voiceSelect.innerHTML = "";

    voices.forEach((voice,index)=>{

        let option = document.createElement("option");

        option.value = index;

        option.textContent =
        `${voice.name} (${voice.lang})`;

        voiceSelect.appendChild(option);
    });
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speakText(){

    let text =
    document.getElementById("text").value;

    if(text.trim()===""){
        alert("Please enter some text");
        return;
    }

    let speech =
    new SpeechSynthesisUtterance(text);

    speech.voice =
    voices[voiceSelect.value];

    speech.rate =
    document.getElementById("rate").value;

    speech.pitch =
    document.getElementById("pitch").value;

    speechSynthesis.cancel();
    speechSynthesis.speak(speech);
}

function pauseSpeech(){
    speechSynthesis.pause();
}

function resumeSpeech(){
    speechSynthesis.resume();
}

function stopSpeech(){
    speechSynthesis.cancel();
}
async function downloadMP3() {

    const text = document.getElementById("text").value;

    const response = await fetch(
      "https://api.elevenlabs.io/v1/text-to-speech/VOICE_ID",
      {
        method: "POST",
        headers: {
          "xi-api-key": "YOUR_API_KEY",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          text: text
        })
      }
    );

    const blob = await response.blob();

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "speech.mp3";
    a.click();
}
</script>

</body>
</html>
